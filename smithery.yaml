name: health-check-ai-mcp
description: "MEOK AI Labs \u2014 HTTP endpoint health monitoring and status checking."
version: 1.0.0
tools:
- name: check_url
  description: Check if a URL is responding. Returns status code, latency, headers.
  parameters:
  - name: url
    type: string
    required: true
  - name: timeout
    type: integer
    required: false
- name: check_multiple
  description: Check multiple URLs (comma-separated). Returns status for each.
  parameters:
  - name: urls
    type: string
    required: true
- name: check_ssl
  description: Check SSL certificate validity and expiration.
  parameters:
  - name: domain
    type: string
    required: true
- name: monitor_uptime
  description: Get uptime estimate based on response pattern.
  parameters:
  - name: url
    type: string
    required: true
